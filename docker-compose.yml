version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: referralai_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    networks:
      - referralai_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: referralai_backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      MONGO_URI: mongodb://admin:password123@mongodb:27017/referralai?authSource=admin
      JWT_SECRET: your_jwt_secret_key_change_in_production
      NODE_ENV: development
      AI_ENGINE_URL: http://ai-engine:8000
    volumes:
      - ./backend:/app
    networks:
      - referralai_network
    command: npm run dev

  ai-engine:
    build:
      context: ./ai-engine
      dockerfile: Dockerfile
    container_name: referralai_ai_engine
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
    volumes:
      - ./ai-engine:/app
    networks:
      - referralai_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: referralai_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - referralai_network
    command: npm run dev

volumes:
  mongo_data:

networks:
  referralai_network:
    driver: bridge
